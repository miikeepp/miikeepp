name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    # Run daily at 03:17 UTC. Avoid minute 00 to reduce scheduling delays.
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate-and-publish:
    name: Generate and publish contribution animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate light and dark SVG animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#7C3AED&color_dots=#EBEDF0,#DDD6FE,#C4B5FD,#8B5CF6,#5B21B6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#A78BFA&color_dots=#161B22,#312E81,#5B21B6,#7C3AED,#A78BFA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish SVG files to the output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
          allow_empty_commit: false
          jekyll: false
          commit_message: "chore: update contribution snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
